name: Deployment aws-demo-attack-lab-v2

on:
  push:
    branches: [ "master" ]

permissions:
  contents: read

env:
    CORTEX_API_KEY: ${{secrets.CORTEX_API_KEY}}
    CORTEX_API_KEY_ID: ${{secrets.CORTEX_API_KEY_ID}}
    CORTEX_API_URL: https://api-davila.xdr.us.paloaltonetworks.com
    detectChanges: false

jobs:
  cortex_code_scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Verify Node.js Version
      run: node -v

    # - name: Download cortexcli
    #   run: |
    #     set -x
    #     crtx_resp=$(curl "${CORTEX_API_URL}/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64" \
    #       -H "x-xdr-auth-id: ${CORTEX_API_KEY_ID}" \
    #       -H "Authorization: ${CORTEX_API_KEY}")
    #     crtx_url=$(echo $crtx_resp | jq -r ".signed_url")
    #     curl -o cortexcli $crtx_url
    #     chmod +x cortexcli
    #     ./cortexcli --version

    # - name: Run Cortex CLI Code Scan
    #   run: |
    #     ./cortexcli \
    #       --api-base-url "${CORTEX_API_URL}" \
    #       --api-key "${CORTEX_API_KEY}" \
    #       --api-key-id "${CORTEX_API_KEY_ID}" \
    #       code scan \
    #       --directory "${{github.workspace}}" \
    #       --repo-id "${{github.repository}}" \
    #       --branch "${{github.ref_name}}" \
    #       --source "GITHUB_ACTIONS" \
    #       --create-repo-if-missing

  
  docker_build:
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app-web
            context: ./app-web
            dockerfile: ./app-web/Dockerfile
            image: davidaavilar/app-web
          - name: app-llm
            context: ./app-llm
            dockerfile: ./app-llm/Dockerfile
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          echo "Base SHA: $BASE_SHA"
          echo "Head SHA: ${{ github.sha }}"

          if git diff --quiet "$BASE_SHA" "${{ github.sha }}" -- "${{ matrix.context }}/" "${{ matrix.dockerfile }}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata
        if: steps.changes.outputs.changed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Set up Docker Buildx
        if: steps.changes.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3
      
      - name: Build image
        if: steps.changes.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          tags: local/${{ matrix.name }}:scan
          load: true
          push: false
      - name: Save image
        if: steps.changes.outputs.changed == 'true'
        run: docker save local/${{ matrix.name }}:scan -o /tmp/${{ matrix.name }}.tar
      - name: Upload image artifact
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-image
          path: /tmp/${{ matrix.name }}.tar
  
  docker_scan_cortex_cloud:
    needs: docker_build
    if: needs.docker_build.outputs.changed
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app-web
            context: ./app-web
            dockerfile: ./app-web/Dockerfile
            image: davidaavilar/app-web
          - name: app-llm
            context: ./app-llm
            dockerfile: ./app-llm/Dockerfile
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.name }}-image
          path: /tmp
        continue-on-error: true
      - name: Check tar
        id: check_tar
        run: |
          if [ -f "/tmp/${{ matrix.name }}.tar" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Hyperscan
        if: steps.check_tar.outputs.exists == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libhyperscan5 jq
      - name: Download cortexcli
        if: steps.check_tar.outputs.exists == 'true'
        run: |
          set -euo pipefail
          crtx_resp=$(curl -fsSL "${CORTEX_API_URL}/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64" \
            -H "x-xdr-auth-id: ${CORTEX_API_KEY_ID}" \
            -H "Authorization: ${CORTEX_API_KEY}")
          crtx_url=$(echo "$crtx_resp" | jq -r '.signed_url')
          curl -fsSL -o cortexcli "$crtx_url"
          chmod +x cortexcli
      - name: Scan local image with Cortex CLI
        continue-on-error: true
        if: steps.check_tar.outputs.exists == 'true'
        run: |
          set -euo pipefail
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n 1)
          ./cortexcli \
            --api-base-url "${CORTEX_API_URL}" \
            --api-key "${CORTEX_API_KEY}" \
            --api-key-id "${CORTEX_API_KEY_ID}" \
            image scan --archive=true /tmp/${{ matrix.name }}.tar
      - name: Skip scan
        if: steps.check_tar.outputs.exists != 'true'
        run: echo "No tar found for ${{ matrix.name }}, skipping."
  docker_push:
    needs: docker_scan_cortex_cloud
    if: needs.docker_build.outputs.changed == 'true' && github.event_name != 'pull_request'
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app-web
            context: ./app-web
            dockerfile: ./app-web/Dockerfile
            image: davidaavilar/app-web
          - name: app-llm
            context: ./app-llm
            dockerfile: ./app-llm/Dockerfile
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.name }}-image
          path: /tmp
      - name: Load image
        run: docker load -i /tmp/${{ matrix.name }}.tar
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}


