<script>
    async function sendMessage() {
        const input = document.getElementById("message");
        const messages = document.getElementById("messages");
        const text = input.value.trim();

        if (!text) return;

        messages.innerHTML += `<div class="msg user"><b>You:</b> ${text}</div>`;
        input.value = "";

        try {
            const response = await fetch("/helloworld/api/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message: text })
            });

            const data = await response.json();
            messages.innerHTML += `<div class="msg bot"><b>LLM:</b> ${data.message}</div>`;
            messages.scrollTop = messages.scrollHeight;
        } catch (e) {
            messages.innerHTML += `<div class="msg bot"><b>Error:</b> Could not contact backend</div>`;
        }
    }
</script>
