---
apiVersion: v1
kind: Namespace
metadata:
  name: app-web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-web
  namespace: app-web
spec:
  selector:
    matchLabels:
      name: app-web
  replicas: 2
  template:
    metadata:
      labels:
        name: app-web
    spec:
      containers:
      - name: app-web
        image: davidaavilar/app-web
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  namespace: app-web
  name: app-web
  labels:
    name: app-web
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
  selector:
    name: app-web
