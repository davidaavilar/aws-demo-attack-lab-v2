---
apiVersion: v1
kind: Namespace
metadata:
  name: priv-pod

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: priv-pod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
        securityContext:
          privileged: true