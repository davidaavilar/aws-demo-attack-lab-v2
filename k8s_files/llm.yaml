---
apiVersion: v1
kind: Namespace
metadata:
  name: ollama-llm
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-llm
  namespace: ollama-llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama-llm
  template:
    metadata:
      labels:
        app: ollama-llm
    spec:
      containers:
        - name: ollama
          image: davidaavilar/ollama-llm:1.0
          ports:
            - containerPort: 11434
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-llm
  namespace: ollama-llm
spec:
  type: ClusterIP
  selector:
    app: ollama-llm
  ports:
    - port: 11434
      targetPort: 11434